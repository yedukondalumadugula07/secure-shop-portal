<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Shop Portal | Secure Services</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; }
        header { background: #2c3e50; color: #fff; padding: 1rem 0; text-align: center; }
        nav { background: #34495e; color: #fff; padding: 0.5rem; text-align: center; }
        .container { width: 80%; margin: auto; overflow: hidden; padding: 2rem; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { border: 1px solid #ddd; padding: 1rem; border-radius: 8px; text-align: center; }
        footer { background: #2c3e50; color: #fff; text-align: center; padding: 1rem; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>
    <header>
        <h1>Secure Shop Portal</h1>
    </header>
    <nav>Home | Products | Services | Contact</nav>
    <div class="container">
        <h2>Featured Products</h2>
        <div class="product-grid">
            <div class="card"><h3>Product 1</h3><p>Secure description here.</p></div>
            <div class="card"><h3>Product 2</h3><p>Secure description here.</p></div>
            <div class="card"><h3>Product 3</h3><p>Secure description here.</p></div>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 Secure Shop Portal. All rights reserved.</p>
    </footer>
</body>
</html>
