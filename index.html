<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureShop | Your E-commerce Portal</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; color: #333; }
        nav { background: #2c3e50; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .hero { background: #34495e; color: white; padding: 3rem 1rem; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 2rem; }
        .product-card { border: 1px solid #ddd; padding: 1.5rem; border-radius: 5px; text-align: center; transition: 0.3s; }
        .product-card:hover { box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        button { background: #27ae60; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>

    <nav>
        <div><strong>SecureShop</strong></div>
        <div>Home | Products | Contact</div>
    </nav>

    <section class="hero">
        <h1>High-Quality Products</h1>
        <p>Built for performance and security.</p>
    </section>

    <div class="grid">
        <div class="product-card">
            <h3>Premium Gadget</h3>
            <p>$99.00</p>
            <button>View Details</button>
        </div>
        <div class="product-card">
            <h3>Secure Hardware</h3>
            <p>$149.00</p>
            <button>View Details</button>
        </div>
        <div class="product-card">
            <h3>Accessories</h3>
            <p>$49.00</p>
            <button>View Details</button>
        </div>
    </div>

</body>
</html>
